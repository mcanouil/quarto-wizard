	// GitHub widget inspired/derived by the GitHub button in https://posit-dev.github.io/great-docs/.
	// Replaces the `#github-widget` navbar placeholder with a GitHub button that
	// shows live star and fork counts and opens a menu of repository links.
	// Counts come from the GitHub REST API, cached in localStorage for four hours
	// so the rate limit is not hit on every page view; a stale cache or `?` covers
	// a failed request. Ported from posit-dev/great-docs.
	(function () {
		"use strict";

		// Edit these two to reuse the widget on another repository.
		const OWNER = "mcanouil";
		const REPO = "quarto-wizard";

		const CACHE_KEY = `quarto-wizard-github-stats-${OWNER}-${REPO}`;
		const CACHE_DURATION = 4 * 60 * 60 * 1000;
		const REPO_URL = `https://github.com/${OWNER}/${REPO}`;

		// Large numbers read better abbreviated: 1500 -> 1.5k, 2000000 -> 2M.
		const formatCount = (value) => {
			if (value === undefined || value === null || value === "?") return "?";
			if (value >= 1e6) return (value / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
			if (value >= 1e3) return (value / 1e3).toFixed(1).replace(/\.0$/, "") + "k";
			return String(value);
		};

		// Read and parse the cached stats, or null. Freshness is judged by the
		// caller so expired data can still serve as a fallback on a failed refresh.
		const readCache = () => {
			try {
				const raw = localStorage.getItem(CACHE_KEY);
				return raw ? JSON.parse(raw) : null;
			} catch (error) {
				return null;
			}
		};

		const writeCache = (data) => {
			try {
				localStorage.setItem(CACHE_KEY, JSON.stringify(data));
			} catch (error) {
				// localStorage may be unavailable (private mode, quota); counts still
				// render from the live response, only the cache is skipped.
			}
		};

						<a href="${REPO_URL}/pulls" class="gh-dropdown-item" role="menuitem" target="_blank" rel="noopener">

								<path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/>

								<path d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 100-1.5.75.75 0 000 1.5z"/>

						<div class="gh-dropdown-divider"></div>
						<a href="${REPO_URL}/discussions/categories/feature-requests" class="gh-dropdown-item" role="menuitem" target="_blank" rel="noopener">
							<svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true">

							</svg>
							Ideas / Feature Requests
						</a>
						<a href="${REPO_URL}/discussions/categories/q-a" class="gh-dropdown-item" role="menuitem" target="_blank" rel="noopener">
							<svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true">
								<path d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0zm6.5 3.5a.875.875 0 100 1.75.875.875 0 000-1.75zM6.92 6.085c.081-.16.19-.299.34-.398.145-.097.371-.187.74-.187.28 0 .553.087.738.225A.613.613 0 019.5 6.25c0 .177-.04.264-.077.318a.956.956 0 01-.277.245c-.076.051-.158.1-.258.161l-.007.004c-.093.056-.204.122-.313.195a2.416 2.416 0 00-.945 1.129.75.75 0 001.396.55c.033-.083.104-.207.359-.377.062-.041.134-.084.226-.139l.009-.006c.084-.05.19-.114.293-.184a2.443 2.443 0 00.69-.671c.171-.254.324-.61.324-1.075 0-.686-.32-1.256-.815-1.628C9.084 4.234 8.516 4 8 4c-.615 0-1.163.152-1.606.446-.446.297-.75.708-.943 1.09a.75.75 0 001.339.674c.096-.19.19-.34.28-.475l.001-.005z"/>
							</svg>
							Q&amp;A
						</a>
						<div class="gh-dropdown-divider"></div>
						<a href="https://marketplace.visualstudio.com/items?itemName=${OWNER}.${REPO}" class="gh-dropdown-item" role="menuitem" target="_blank" rel="noopener">
							<svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true">
								<path d="M2 3.75C2 2.784 2.784 2 3.75 2h.5C5.216 2 6 2.784 6 3.75v1.5c0 .078-.005.155-.015.23A1.75 1.75 0 017 5.25V3.75C7 2.784 7.784 2 8.75 2h.5c.966 0 1.75.784 1.75 1.75v1.5c0 .078-.005.155-.015.23A1.75 1.75 0 0112 5.25v-1.5C12 2.784 12.784 2 13.75 2h.5c.966 0 1.75.784 1.75 1.75v8.5A1.75 1.75 0 0114.25 14h-.5A1.75 1.75 0 0112 12.25v-1.5c0-.078.005-.155.015-.23A1.75 1.75 0 0111 10.75v1.5c0 .966-.784 1.75-1.75 1.75h-.5A1.75 1.75 0 016 12.25v-1.5c0-.078.005-.155.015-.23A1.75 1.75 0 015 10.75v1.5c0 .966-.784 1.75-1.75 1.75h-.5A1.75 1.75 0 011 12.25v-8.5z"/>
							</svg>
							Visual Studio Marketplace
						</a>
						<a href="https://open-vsx.org/extension/${OWNER}/${REPO}" class="gh-dropdown-item" role="menuitem" target="_blank" rel="noopener">
							<svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true">
								<path d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 011.11-3.653c.362.222.789.451 1.264.665C4.116 5.62 4.5 6.63 4.5 7.5c0 .78.32 1.487.836 1.995A6.474 6.474 0 004.5 12c-.966.483-1.723 1.156-2.187 1.687A6.469 6.469 0 011.5 8zm3.62 5.377c.407-.459 1.014-1 1.83-1.377.436.32.973.5 1.55.5.577 0 1.114-.18 1.55-.5.816.377 1.423.918 1.83 1.377A6.47 6.47 0 018 14.5a6.47 6.47 0 01-2.88-.623zM13.687 9.687C13.223 9.156 12.466 8.483 11.5 8a2.25 2.25 0 00.836-1.995c0-.87.384-1.88.626-2.488a6.9 6.9 0 001.264-.665A6.5 6.5 0 0114.5 8a6.469 6.469 0 01-.813 1.687zM8 6.5a1 1 0 110-2 1 1 0 010 2z"/>
							</svg>
							Open VSX
						</a>
						<div class="gh-dropdown-divider"></div>
						<a href="https://github.com/sponsors/${OWNER}?o=esb" class="gh-dropdown-item" role="menuitem" target="_blank" rel="noopener">
							<svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true">
								<path d="m8 14.25.345.666a.75.75 0 0 1-.69 0l-.008-.004-.018-.01a7.152 7.152 0 0 1-.31-.17 22.055 22.055 0 0 1-3.434-2.414C2.045 10.731 0 8.35 0 5.5 0 2.836 2.086 1 4.25 1 5.797 1 7.153 1.802 8 3.02 8.847 1.802 10.203 1 11.75 1 13.914 1 16 2.836 16 5.5c0 2.85-2.045 5.231-3.885 6.834a22.066 22.066 0 0 1-3.744 2.584l-.018.01-.006.003h-.002Z"/>
							</svg>
							Sponsor
						</a>
					</div>
				</div>
			`;
			return widget;
		};

		const showStats = (widget, stats) => {
			const setCount = (selector, value) => {
				const node = widget.querySelector(selector);
				if (node) node.textContent = formatCount(value);
			};
			setCount('.gh-count[data-stat="stars"]', stats.stars);
			setCount('.gh-count[data-stat="forks"]', stats.forks);
		};

		const loadStats = (widget) => {
			// Read + parse the cache once; branch on freshness so the stale-fallback
			// path does not re-read and re-parse the same entry.
			const cached = readCache();
			if (cached && Date.now() - cached.timestamp <= CACHE_DURATION) {
				showStats(widget, cached);
				return;
			}
			const stale = cached;

			fetch(`https://api.github.com/repos/${OWNER}/${REPO}`, {
				headers: {
					Accept: "application/vnd.github+json",
					"X-GitHub-Api-Version": "2022-11-28",
				},
			})
				.then((response) => (response.ok ? response.json() : Promise.reject(response.status)))
				.then((data) => {
					const stats = {
						stars: data.stargazers_count,
						forks: data.forks_count,
						timestamp: Date.now(),
					};
					writeCache(stats);
					showStats(widget, stats);
				})
				.catch(() => showStats(widget, stale || { stars: "?", forks: "?" }));
		};

		const setupDropdown = (widget) => {
			const trigger = widget.querySelector(".gh-widget-trigger");
			const dropdown = widget.querySelector(".gh-dropdown");
			if (!trigger || !dropdown) return;

			const setOpen = (open) => {
				trigger.setAttribute("aria-expanded", String(open));
				dropdown.setAttribute("aria-hidden", String(!open));
				widget.classList.toggle("gh-widget-open", open);
			};

			trigger.addEventListener("click", (event) => {
				event.stopPropagation();
				setOpen(trigger.getAttribute("aria-expanded") !== "true");
			});

			trigger.addEventListener("keydown", (event) => {
				if (event.key === "Enter" || event.key === " ") {
					event.preventDefault();
					trigger.click();
				}
			});

			document.addEventListener("click", (event) => {
				if (!widget.contains(event.target)) setOpen(false);
			});

			document.addEventListener("keydown", (event) => {
				if (event.key === "Escape") setOpen(false);
			});
		};

		document.addEventListener("DOMContentLoaded", function () {
			// Quarto rewrites the placeholder href to a relative path (`./#github-widget`
			// at the root, `../#github-widget` deeper), so match the fragment suffix
			// rather than an exact href.
			const anchor = document.querySelector('a[href$="#github-widget"]');
			if (!anchor) return;
			const slot = anchor.closest("li");
			if (!slot) return;

			const widget = buildWidget();
			slot.replaceWith(widget);
			loadStats(widget);
			setupDropdown(widget);
		});
	})();
</script>
