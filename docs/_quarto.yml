project:
  type: website
  output-dir: _site
  resources:
    - assets/schema

lang: en
# date: today
# date-modified: today
date-format: "dddd[, the] Do [of] MMMM, YYYY"
highlight-style: github
image: "assets/social/social-card.png"

website:
  title: "Quarto Wizard {{< env VERSION >}}"
  description: "A Visual Studio Code extension that helps you manage Quarto projects and extensions."
  favicon: "assets/logo/logo.svg"
  image: "assets/social/social-card.png"
  image-alt: "Quarto Wizard logo - a cartoon dog wizard wearing a dark hat with red band holding a magic wand"
  site-url: "https://m.canouil.dev/quarto-wizard"
  repo-url: https://github.com/mcanouil/quarto-wizard
  repo-actions: []
  repo-link-target: _blank
  llms-txt: true

  page-footer:
    border: true
    background: dark
    foreground: light
    left: |
      Powered by [{{< iconify simple-icons:quarto title="Quarto Logo" label="Quarto Logo" >}} Quarto](https://quarto.org).
    center: |
      &copy; []{#current-year} [Mickaël CANOUIL](https://mickael.canouil.fr). [{{< iconify octicon:heart-fill-16 title="Heart" label="Heart" >}} Sponsor](https://github.com/sponsors/mcanouil?o=esb).
    right: |
      Licence: [MIT](https://github.com/mcanouil/quarto-wizard?tab=MIT-1-ov-file#readme).
  navbar:
    logo: "assets/logo/logo.png"
    logo-alt: "Quarto Wizard"
    background: dark
    foreground: light
    left:
      - text: Home
        href: index.qmd
      - text: Getting Started
        href: getting-started/index.qmd
      - text: Reference
        href: reference/index.qmd
      - text: API
        href: api/index.qmd
      - text: Changelog
        href: changelog.qmd
    right:
      - text: "{{< iconify octicon:person-16 title='Person' label='Credits' >}} Credits"
        href: credits.qmd
      - text: "{{< iconify octicon:mark-github-16 title='GitHub' label='GitHub' >}}"
        href: "#github-widget"
        aria-label: "GitHub"

metadata-files:
  - _sidebar-getting-started.yml
  - _sidebar-reference.yml
  - _sidebar-api.yml

brand: _brand.yml
format:
  html:
    theme:
      light: &theme
        - brand
        - assets/stylesheets/theme.scss
      dark: *theme
    respect-user-color-scheme: true
    grid:
      sidebar-width: 300px
      body-width: 900px
      margin-width: 300px
    toc: true
    toc-depth: 4
    anchor-sections: true
    fig-align: center
    link-external-newwindow: true
    email-obfuscate: javascript
    code-link: false
    code-copy: true
    code-overflow: scroll
    include-before-body:
      - assets/include/skip-link.html
    include-after-body:
      - assets/include/current-year.html
      - assets/include/ordinal-dates.html
      - assets/include/a11y-fixes.html
      - assets/include/navbar-tooltips.html
      - assets/include/github-widget.html

execute:
  freeze: auto
  echo: false

filters:
  - code-window
