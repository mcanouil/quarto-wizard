project:
  type: website
  output-dir: _site
  resources:
    - assets/schema

lang: en-GB
# date: today
# date-modified: today
date-format: "dddd[, the] Do [of] MMMM, YYYY"
image: "assets/social/social-card.png"

website:
  title: "Quarto Wizard {{< env VERSION >}}"
  description: "A Visual Studio Code extension that helps you manage Quarto projects and extensions."
  favicon: "assets/logo/logo.svg"
  image: "assets/social/social-card.png"
  image-alt: "Quarto Wizard logo - a cartoon dog wizard wearing a dark hat with red band holding a magic wand"
  site-url: "https://m.canouil.dev/quarto-wizard"
  repo-url: https://github.com/mcanouil/quarto-wizard
  repo-actions: [edit, issue]
  repo-link-target: _blank
  repo-link-rel: noopener noreferrer
  open-graph: true
  page-navigation: true
  back-to-top-navigation: true
  llms-txt: true
  search:
    location: navbar
    type: overlay

  page-footer:
    border: true
    background: dark
    foreground: light
    left: |
      Powered by [{{< iconify simple-icons:quarto title="Quarto Logo" label="Quarto Logo" >}} Quarto](https://quarto.org).
    center: |
      &copy; []{#current-year} [Mickaël CANOUIL](https://mickael.canouil.fr). [{{< iconify octicon:heart-fill-16 title="Heart" label="Heart" >}} Sponsor](https://github.com/sponsors/mcanouil?o=esb).
    right: |
      Licence: [MIT](https://github.com/mcanouil/quarto-wizard?tab=MIT-1-ov-file#readme).
  navbar:
    title: "Quarto Wizard"
    logo: "assets/logo/logo.png"
    logo-alt: "Quarto Wizard"
    background: dark
    foreground: light
    search: true
    left:
      # - text: "{{< iconify octicon:home-16 title='Home' label='Home' >}} Home"
      #   href: index.qmd
      - text: "{{< iconify octicon:rocket-16 title='Getting Started' label='Getting Started' >}} Getting Started"
        href: getting-started/index.qmd
      - text: "{{< iconify octicon:book-16 title='Reference' label='Reference' >}} Reference"
        href: reference/index.qmd
      - text: "{{< iconify octicon:code-16 title='API' label='API' >}} API"
        href: api/index.qmd
      - text: "{{< iconify octicon:history-16 title='Changelog' label='Changelog' >}} Changelog"
        href: changelog.qmd
    right:
      - text: "{{< iconify octicon:person-16 title='Person' label='Credits' >}} Credits"
        href: credits.qmd
      - text: "{{< iconify octicon:mark-github-16 title='GitHub' label='GitHub' >}}"
        href: "#gitlink-widget"
        aria-label: "GitHub"

metadata-files:
  - _sidebar-getting-started.yml
  - _sidebar-reference.yml
  - _sidebar-api.yml

brand: _brand.yml
format:
  html:
    theme:
      light: &theme
        - brand
        - assets/stylesheets/theme.scss
      dark: *theme
    respect-user-color-scheme: true
    syntax-highlighting:
      light: github-light
      dark: github-dark
    grid:
      sidebar-width: 300px
      body-width: 900px
      margin-width: 300px
    toc: true
    toc-depth: 4
    anchor-sections: true
    fig-align: center
    link-external-newwindow: true
    email-obfuscate: javascript
    code-link: false
    code-copy: true
    code-overflow: wrap
    include-before-body:
      - assets/scripts/skip-link.html
    include-after-body:
      - assets/scripts/current-year.html
      - assets/scripts/external-links.html
      - assets/scripts/ordinal-dates.html
      - assets/scripts/a11y-fixes.html
      - assets/scripts/navbar-tooltips.html

execute:
  freeze: auto
  echo: false

filters:
  - code-window
  - at: post-quarto
    path: gitlink

extensions:
  gitlink:
    # Widget only: the platform and repository come from `website.repo-url`,
    # and in-text reference rewriting stays off.
    enabled: false
    widget:
      enabled: true
      extra-links:
        - text: "Ideas / Feature Requests"
          href: "/discussions/categories/feature-requests"
          icon: discussion
        - text: "Q&A"
          href: "/discussions/categories/q-a"
          icon: question
        - text: "Visual Studio Marketplace"
          href: "https://marketplace.visualstudio.com/items?itemName=mcanouil.quarto-wizard"
          icon: marketplace
        - text: "Open VSX"
          href: "https://open-vsx.org/extension/mcanouil/quarto-wizard"
          icon: globe
      sponsor: mcanouil
      style-navbar-tools: true
